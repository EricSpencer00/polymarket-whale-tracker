name: Edge Monitor

on:
  schedule:
    # Every 8 hours — 00:00, 08:00, 16:00 UTC
    - cron: '0 0,8,16 * * *'
  workflow_dispatch:
    inputs:
      force_issue:
        description: 'Force-open a GitHub issue even without decay'
        required: false
        default: 'false'

permissions:
  contents: write
  issues: write

concurrency:
  group: edge-monitor
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests cryptography

      - name: Run edge scan
        id: scan
        run: python scripts/edge_scan.py
        continue-on-error: true

      - name: Commit findings
        run: |
          git config user.name "edge-monitor[bot]"
          git config user.email "edge-monitor@users.noreply.github.com"
          git config commit.gpgsign false
          git add findings/
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
          else
            git pull --rebase origin main || true
            git commit -m "chore: edge scan $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Build issue body
        id: issue_body
        if: steps.scan.outcome == 'failure' || github.event.inputs.force_issue == 'true'
        run: |
          python3 - <<'PYEOF'
          import glob, json, os, sys

          files = sorted(glob.glob("findings/edge_scan_*.json"))
          if not files:
              print("No scan files found.")
              sys.exit(0)

          latest = json.load(open(files[-1]))
          alerts = latest.get("decay_alerts", [])
          high = [a for a in alerts if a["severity"] == "HIGH"]
          patterns = latest.get("cross_wallet_patterns", [])[:5]
          date = latest.get("date", "unknown")

          rows = "\n".join(
              f"| {'HIGH' if a['severity']=='HIGH' else 'MEDIUM'} | {a['pattern']} "
              f"| ${a['old_ev']:.3f} | ${a['new_ev']:.3f} | {a['pct_drop']*100:.0f}% |"
              for a in alerts
          ) or "*(none)*"

          pat_rows = "\n".join(
              f"| {p['bucket_label']} | {p['wallet_count']} | ${p['avg_ev_per_trade']:.3f} "
              f"| {p['avg_true_wr']*100:.1f}% | {'yes' if p['passes_cross_wallet'] else 'no'} |"
              for p in patterns
          ) or "*(none)*"

          body = f"""## Edge Decay Alert -- {date}

          {len(high)} HIGH severity decay(s) detected. Review and consider swapping strategy.

          ### Decay Alerts
          | Severity | Pattern | Old EV | New EV | Drop |
          |---|---|---|---|---|
          {rows}

          ### Current Best Patterns
          | Pattern | Wallets | EV/trade | WR | OOS |
          |---|---|---|---|---|
          {pat_rows}

          ### Next Steps
          1. Review findings/edge_scan_{date.replace('-','')}_*.json for full detail
          2. Paper trade the top OOS-passing pattern (20+ fills) before live capital
          """

          title = f"Edge decay detected -- {date} ({len(high)} HIGH alert{'s' if len(high)!=1 else ''})"

          # Write to env files for next step
          delimiter = "EOF_BODY"
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"title={title}\n")
              f.write(f"body<<{delimiter}\n{body}\n{delimiter}\n")
              f.write(f"high_count={len(high)}\n")
          PYEOF

      - name: Open decay-alert issue
        if: steps.issue_body.outputs.high_count > 0 || github.event.inputs.force_issue == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "${{ steps.issue_body.outputs.title }}" \
            --body "${{ steps.issue_body.outputs.body }}" \
            --label "edge-decay,automated"

      - name: Summary
        if: always()
        run: |
          ls -la findings/edge_scan_*.json 2>/dev/null | tail -5 || echo "No scan files yet."
