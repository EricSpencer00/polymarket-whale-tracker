name: Edge Monitor

on:
  schedule:
    # Every 8 hours — 00:00, 08:00, 16:00 UTC
    - cron: '0 0,8,16 * * *'
  workflow_dispatch:
    inputs:
      force_issue:
        description: 'Force-open a GitHub issue even without decay'
        required: false
        default: 'false'

permissions:
  contents: write       # commit findings
  issues: write         # open decay-alert issues

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45   # wallet scrape can take ~20 min for 50 wallets

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests cryptography

      - name: Run edge scan
        id: scan
        run: python scripts/edge_scan.py
        # Exit code 2 = HIGH decay alert; we catch it below
        continue-on-error: true

      - name: Capture scan exit code
        id: exit_code
        run: echo "code=${{ steps.scan.outcome == 'failure' && '2' || '0' }}" >> $GITHUB_OUTPUT

      - name: Commit findings
        run: |
          git config user.name "edge-monitor[bot]"
          git config user.email "edge-monitor@users.noreply.github.com"
          git config commit.gpgsign false
          git add findings/
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
          else
            git commit -m "chore: edge scan $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Open decay-alert issue
        if: steps.scan.outcome == 'failure' || github.event.inputs.force_issue == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Find the latest scan JSON
            const dataDir = 'findings';
            const files = fs.readdirSync(dataDir)
              .filter(f => f.startsWith('edge_scan_') && f.endsWith('.json'))
              .sort();

            if (!files.length) {
              core.warning('No scan files found — cannot open issue.');
              return;
            }

            const latest = JSON.parse(fs.readFileSync(path.join(dataDir, files[files.length - 1])));
            const alerts = latest.decay_alerts || [];
            const high = alerts.filter(a => a.severity === 'HIGH');

            if (!high.length && github.event.inputs.force_issue !== 'true') return;

            const rows = alerts.map(a =>
              `| ${a.severity === 'HIGH' ? '🔴' : '🟡'} ${a.pattern} | \$${a.old_ev} | \$${a.new_ev} | ${(a.pct_drop * 100).toFixed(0)}% |`
            ).join('\n');

            const patterns = (latest.cross_wallet_patterns || []).slice(0, 5).map(p =>
              `| ${p.bucket_label} | ${p.wallet_count} | \$${p.avg_ev_per_trade} | ${(p.avg_true_wr * 100).toFixed(1)}% | ${p.passes_cross_wallet ? '✓' : '—'} |`
            ).join('\n');

            const body = `## Edge Decay Alert — ${latest.date}

**${high.length} HIGH severity decays detected.** Review and consider swapping strategy.

### Decay Alerts
| Severity | Pattern | Old EV | New EV | Drop |
|---|---|---|---|---|
${rows || '*(none)*'}

### Current Best Patterns
| Pattern | Wallets | EV/trade | WR | OOS |
|---|---|---|---|---|
${patterns || '*(no cross-wallet patterns found)*'}

### Next Steps
1. Review \`data/edge_scan_${latest.date.replace(/-/g,'')}_*.json\` for full detail
2. Run \`python research/edge_monitor.py --recommend\` in arb-market for strategy swap recommendation
3. Paper trade the top OOS-passing pattern (20+ fills) before any live capital

_Auto-opened by [edge_monitor workflow](../actions/workflows/edge_monitor.yml)_
`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Edge decay detected — ${latest.date} (${high.length} HIGH alert${high.length !== 1 ? 's' : ''})`,
              body,
              labels: ['edge-decay', 'automated'],
            });

      - name: Summary
        if: always()
        run: |
          echo "Scan complete. Check data/ for findings."
          ls -la findings/edge_scan_*.json 2>/dev/null | tail -5 || echo "No scan files yet."
